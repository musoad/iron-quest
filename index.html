<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>IRON QUEST — Hunter Ascended</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0b0b0c" />

  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
</head>
<body>
  <header class="topbar">

      <div class="logo">⚔</div>
      <div>
        <div class="title">IRON QUEST</div>
        <div class="subtitle" id="statusLine">Booting…</div>
      </div>
    </div>
    <div class="topActions">
      <button class="iconBtn" id="btnSystemLog" title="System Log">⌁</button>

  <main>
    <section id="home" class="tab active"></section>
    <section id="log" class="tab"></section>

    <button data-tab="gates" aria-label="Gates">🌀<span>Gates</span></button>

    <button data-tab="skills" aria-label="Skills">🧬<span>Skills</span></button>
    <button data-tab="review" aria-label="Review">📊<span>Review</span></button>
    <button data-tab="health" aria-label="Health">❤️<span>Health</span></button>
    <button data-tab="backup" aria-label="Backup">💾<span>Backup</span></button>
  </nav>

  <!-- Core -->
  <script src="js/utils.js"></script>
  <script src="js/ui_effects.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/db.js"></script>

  <!-- Data + Systems -->
  <script src="js/exercises.js"></script>
  <script src="js/progression.js"></script>
  <script src="js/hunterRank.js"></script>

  <script src="js/skilltree_v2.js"></script>

  <script src="js/coach_engine.js"></script>

  <script src="js/skills.js"></script>
  <script src="js/logFeature.js"></script>
  <script src="js/gates.js"></script>
  <script src="js/bossArena.js"></script>
  <script src="js/review.js"></script>
  <script src="js/health.js"></script>

  <script src="js/app.js"></script>
  <script src="sw.js"></script>
