<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0c" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>IRON QUEST — Hybrid Training</title>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="app-icon">🏋️</div>
      <div class="brand-text">
        <div class="brand-title">IRON QUEST</div>
        <div class="brand-sub" id="statusLine">Hybrid Plan • Joggen • Stats • Health</div>
      </div>
    </div>
    <button class="icon-btn" id="btnSystemLog" title="System Log">⌁</button>
  </header>

  <div id="updateBanner" class="updateBanner" style="display:none;">
    <div class="uText">Update verfügbar</div>
    <button class="uBtn" id="btnUpdateReload">Reload</button>
  </div>

  <main class="app">
    <section class="tab" id="home"></section>
    <section class="tab" id="log"></section>
    <section class="tab" id="history"></section>
    <section class="tab" id="plans"></section>
    <section class="tab" id="run"></section>
    <section class="tab" id="stats"></section>
    <section class="tab" id="review"></section>
    <section class="tab" id="health"></section>
    <section class="tab" id="backup"></section>
  </main>

  <nav class="bottom-nav">
    <button data-tab="home" class="active"><span class="i">🏠</span><span>Home</span></button>
    <button data-tab="log"><span class="i">📒</span><span>Log</span></button>
    <button data-tab="run"><span class="i">🏃</span><span>Run</span></button>
    <button data-tab="stats"><span class="i">📊</span><span>Stats</span></button>
    <button id="btnMore"><span class="i">⋯</span><span>More</span></button>
  </nav>

  <button id="fabGlobal" class="fab" title="Quick Add" aria-label="Quick Add">＋</button>

  <script defer src="js/utils.js"></script>
  <script defer src="js/schema.js"></script>
  <script defer src="js/ui.js"></script>
  <script defer src="js/uiEffects.js"></script>
  <script defer src="js/toast.js"></script>
  <script defer src="js/urls.js"></script>
  <script defer src="js/db.js"></script>
  <script defer src="js/state.js"></script>
  <script defer src="js/exercises.js"></script>
  <script defer src="js/plans.js"></script>
  <script defer src="js/progression.js"></script>
  <script defer src="js/profile.js"></script>
  <script defer src="js/hunterRank.js"></script>
  <script defer src="js/xpSystem.js"></script>
  <script defer src="js/attributes.js"></script>
  <script defer src="js/session.js"></script>
  <script defer src="js/hunterStats.js"></script>
  <script defer src="js/home.js"></script>
  <script defer src="js/logFeature.js"></script>
  <script defer src="js/history.js"></script>
  <script defer src="js/plansView.js"></script>
  <script defer src="js/jogging.js"></script>
  <script defer src="js/analytics.js"></script>
  <script defer src="js/review.js"></script>
  <script defer src="js/health.js"></script>
  <script defer src="js/backup.js"></script>
  <script defer src="js/integrity.js"></script>
  <script defer src="js/app.js"></script>
</body>
</html>
